<!DOCTYPE html>
<html lang="en">
<head>

<title>{{ .Title }}</title>

</head>
<body>
  {{ block "main" . }}{{ end }}

    <p>Verified Data | Updated every 3 hours | Low-Bandwidth Mode</p>
    <p>Support this utility: <a href="https://ko-fi.com/davidbruchmann">https://ko-fi.com/davidbruchmann</a></p>
  </footer>

</html>
