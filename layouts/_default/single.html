{{ define "main" }}
  <h1>{{ .Title }}</h1>

  <!-- The Chart Canvas -->
  <div style="margin: 20px 0; background: #f9f9f9; padding: 10px; border-radius: 8px;">
    <canvas id="detailChart"></canvas>
  </div>

  <script src="https://cdn.jsdelivr.net"></script>
  <script>
    const ctx = document.getElementById('detailChart').getContext('2d');

    // We pull the last 14 days of data from the JSON
    const rawData = {{ (index .Site.Data .Slug).data | jsonify | safeJS }};
    const labels = rawData.slice(0, 14).map(item => item.date).reverse();
    const values = rawData.slice(0, 14).map(item => item.value).reverse();

    new Chart(ctx, {
      type: 'line',
      data: {
        labels: labels,
        datasets: [{
          label: 'Price (USD)',
          data: values,
          borderColor: '#c62828',
          tension: 0.1
        }]
      }
    });
  </script>

  <p><a href="/crisis-tracker/" class="btn">← Back to Live Dashboard</a></p>
{{ end }}
