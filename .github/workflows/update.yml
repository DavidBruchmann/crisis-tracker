name: Update-Data
on:
  schedule:
    - cron: '0 */3 * * *'
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
#      - name: Debug Secret
#        run: |
#          KEY_LENGTH=${#SECRET_VALUE}
#          echo "The API Key length is: $KEY_LENGTH characters"
#          if [ "$KEY_LENGTH" -lt 5 ]; then
#            echo "ERROR: API Key is missing or too short!"
#            exit 1
#          fi
#        env:
#          SECRET_VALUE: ${{ secrets.OIL_API_KEY }}
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Pages
        uses: actions/configure-pages@v4
      - name: Fetch Data
        run: |

          # Create data directory if it doesn't exist
          mkdir -p data

          # Fetch Brent (Global/Middle East Benchmark)
          curl -f "https://www.alphavantage.co/query?function=BRENT&interval=daily&apikey=${{ secrets.OIL_API_KEY }}" -o data/brent.json || echo '{"data":[]}' > data/brent.json
          sleep 2

          # Fetch WTI (US Benchmark)
          curl -f "https://www.alphavantage.co/query?function=WTI&interval=daily&apikey=${{ secrets.OIL_API_KEY }}" -o data/wti.json || echo '{"data":[]}' > data/wti.json
          sleep 2

          # Fetch Natural Gas (LNG Status)
          curl -f "https://www.alphavantage.co/query?function=NATURAL_GAS&interval=daily&apikey=${{ secrets.OIL_API_KEY }}" -o data/gas.json || echo '{"data":[]}' > data/gas.json

          # Check if it contains an error message, if not, move it to the real file
          #if grep -q "Global Quote" data/brent.json; then
          #  mv data/oil_temp.json data/oil.json
          #else
          #  echo "API failed or returned error. Using placeholder."
          #fi
      - name: Debug Data
        run: |
          echo "Checking Brent Data:"
          cat data/brent.json
          echo "Checking WTI Data:"
          cat data/wti.json

      - name: Validate JSON Files
        run: |
          # If any file contains HTML (starts with <), reset it to prevent Hugo crash
          for f in data/*.json; do
            if grep -q "^<" "$f"; then
              echo '{"data": [{"value": "0.00"}]}' > "$f"
            fi
          done

      - name: Setup Hugo
#        uses: peaceiris/actions-hugo@v2
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: 'latest'
          extended: true
      - name: Clean Public
        run: |
          rm -rf public/
      - name: Build
        run: hugo --minify --baseURL "https://davidbruchmann.github.io/crisis-tracker/"
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./public

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

#      - name: Deploy
#        uses: peaceiris/actions-gh-pages@v3
#        with:
#          github_token: ${{ secrets.GITHUB_TOKEN }}
#          publish_dir: ./public
#          publish_branch: gh-pages
